<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="600" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="1600" cy="100" r="90" fill="#fbbf24" opacity="0.15"/>
  <circle cx="1600" cy="100" r="65" fill="#fbbf24" opacity="0.2"/>

  <!-- Ground -->
  <ellipse cx="960" cy="650" rx="1200" ry="200" fill="#10b981" opacity="0.12"/>

  <!-- House left -->
  <rect x="180" y="280" width="340" height="260" rx="8" fill="#ffffff" opacity="0.92"/>
  <polygon points="180,280 350,160 520,280" fill="#f97316" opacity="0.90"/>
  <!-- Roof detail -->
  <polygon points="220,280 350,170 480,280" fill="#ea580c" opacity="0.25"/>
  <!-- Door -->
  <rect x="310" y="420" width="80" height="120" rx="6" fill="#0ea5e9" opacity="0.85"/>
  <!-- Door knob -->
  <circle cx="355" cy="478" r="6" fill="#ffffff"/>
  <!-- Windows -->
  <rect x="208" y="330" width="80" height="65" rx="4" fill="#bae6fd" opacity="0.9"/>
  <line x1="248" y1="330" x2="248" y2="395" stroke="#93c5fd" stroke-width="2"/>
  <line x1="208" y1="362" x2="288" y2="362" stroke="#93c5fd" stroke-width="2"/>
  <rect x="420" y="330" width="80" height="65" rx="4" fill="#bae6fd" opacity="0.9"/>
  <line x1="460" y1="330" x2="460" y2="395" stroke="#93c5fd" stroke-width="2"/>
  <line x1="420" y1="362" x2="500" y2="362" stroke="#93c5fd" stroke-width="2"/>
  <!-- Security camera on house -->
  <rect x="495" y="285" width="32" height="18" rx="4" fill="#1e293b" opacity="0.9"/>
  <circle cx="503" cy="294" r="7" fill="#334155"/>
  <!-- Green LED -->
  <circle cx="519" cy="288" r="4" fill="#10b981"/>
  <!-- Alarm box -->
  <rect x="210" y="400" width="42" height="32" rx="4" fill="#f97316" opacity="0.9"/>
  <circle cx="231" cy="416" r="5" fill="#fff" opacity="0.8"/>

  <!-- House path / walkway -->
  <polygon points="320,540 390,540 420,600 290,600" fill="#e2e8f0" opacity="0.7"/>

  <!-- Tree left -->
  <rect x="130" y="440" width="14" height="100" rx="4" fill="#92400e" opacity="0.7"/>
  <ellipse cx="137" cy="420" rx="40" ry="50" fill="#10b981" opacity="0.75"/>

  <!-- Tree right -->
  <rect x="570" y="460" width="12" height="80" rx="4" fill="#92400e" opacity="0.7"/>
  <ellipse cx="576" cy="445" rx="32" ry="40" fill="#059669" opacity="0.7"/>

  <!-- ─── Family group (center) ─── -->
  <!-- Dad -->
  <circle cx="880" cy="290" r="38" fill="#fde68a"/>
  <rect x="852" y="328" width="56" height="90" rx="14" fill="#0ea5e9"/>
  <!-- Dad arm pointing to house -->
  <line x1="852" y1="360" x2="800" y2="340" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
  <!-- Dad legs -->
  <line x1="865" y1="418" x2="855" y2="480" stroke="#1e293b" stroke-width="13" stroke-linecap="round"/>
  <line x1="893" y1="418" x2="903" y2="480" stroke="#1e293b" stroke-width="13" stroke-linecap="round"/>
  <!-- Dad smile -->
  <path d="M865 298 Q880 310 895 298" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <!-- Dad eyes -->
  <circle cx="870" cy="283" r="4" fill="#1e293b"/>
  <circle cx="890" cy="283" r="4" fill="#1e293b"/>

  <!-- Mom -->
  <circle cx="970" cy="295" r="35" fill="#fde68a"/>
  <!-- Mom hair -->
  <ellipse cx="970" cy="270" rx="38" ry="22" fill="#92400e" opacity="0.8"/>
  <rect x="945" y="330" width="50" height="85" rx="14" fill="#f97316"/>
  <!-- Mom legs -->
  <line x1="958" y1="415" x2="948" y2="478" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
  <line x1="983" y1="415" x2="993" y2="478" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
  <!-- Mom smile -->
  <path d="M957 303 Q970 315 983 303" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="963" cy="288" r="3.5" fill="#1e293b"/>
  <circle cx="978" cy="288" r="3.5" fill="#1e293b"/>

  <!-- Child 1 (boy, left of dad) -->
  <circle cx="810" cy="330" r="26" fill="#fde68a"/>
  <rect x="790" y="356" width="40" height="65" rx="10" fill="#10b981"/>
  <line x1="798" y1="421" x2="790" y2="468" stroke="#1e293b" stroke-width="10" stroke-linecap="round"/>
  <line x1="822" y1="421" x2="830" y2="468" stroke="#1e293b" stroke-width="10" stroke-linecap="round"/>
  <circle cx="803" cy="323" r="3" fill="#1e293b"/>
  <circle cx="818" cy="323" r="3" fill="#1e293b"/>
  <path d="M800 337 Q810 345 820 337" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Child 2 (girl, right of mom) -->
  <circle cx="1045" cy="335" r="24" fill="#fde68a"/>
  <!-- Girl hair bows -->
  <ellipse cx="1030" cy="318" rx="12" ry="8" fill="#f97316" opacity="0.9"/>
  <ellipse cx="1060" cy="318" rx="12" ry="8" fill="#f97316" opacity="0.9"/>
  <rect x="1025" y="359" width="40" height="60" rx="10" fill="#0ea5e9" opacity="0.9"/>
  <line x1="1034" y1="419" x2="1026" y2="465" stroke="#1e293b" stroke-width="9" stroke-linecap="round"/>
  <line x1="1056" y1="419" x2="1064" y2="465" stroke="#1e293b" stroke-width="9" stroke-linecap="round"/>
  <circle cx="1038" cy="329" r="2.8" fill="#1e293b"/>
  <circle cx="1052" cy="329" r="2.8" fill="#1e293b"/>
  <path d="M1036 342 Q1045 350 1055 342" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ─── Big Shield (center-right) ─── -->
  <path d="M1160 200 L1240 228 L1240 308 Q1240 358 1200 375 Q1160 358 1160 308 Z" fill="url(#shieldGrad)" opacity="0.92"/>
  <!-- Checkmark inside shield -->
  <polyline points="1178 300 1196 320 1225 280" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phone mockup -->
  <rect x="1310" y="210" width="130" height="240" rx="18" fill="#1e293b" opacity="0.92"/>
  <rect x="1322" y="228" width="106" height="202" rx="10" fill="#0ea5e9" opacity="0.35"/>
  <!-- Camera feed on phone -->
  <rect x="1330" y="238" width="90" height="65" rx="6" fill="#0ea5e9" opacity="0.6"/>
  <!-- House in feed -->
  <polygon points="1355,283 1375,265 1395,283" fill="white" opacity="0.8"/>
  <rect x="1362" y="283" width="26" height="20" fill="white" opacity="0.7"/>
  <!-- Notification pill on phone -->
  <rect x="1328" y="315" width="94" height="26" rx="8" fill="#10b981" opacity="0.85"/>
  <text x="1375" y="333" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">✔ Todo bien</text>
  <!-- WiFi icon on phone -->
  <path d="M1375 355 Q1395 340 1415 355" fill="none" stroke="white" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path d="M1375 365 Q1387 358 1401 365" fill="none" stroke="white" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <circle cx="1388" cy="375" r="4" fill="white" opacity="0.7"/>

  <!-- Floating stars/trust badges -->
  <rect x="1490" y="160" width="160" height="50" rx="12" fill="white" opacity="0.9"/>
  <text x="1570" y="181" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#f97316">★★★★★</text>
  <text x="1570" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569" font-weight="600">Clientes satisfechos</text>

  <rect x="1490" y="230" width="160" height="50" rx="12" fill="white" opacity="0.9"/>
  <text x="1502" y="252" font-family="Arial,sans-serif" font-size="18" fill="#10b981">🛡</text>
  <text x="1528" y="253" font-family="Arial,sans-serif" font-size="13" fill="#1e293b" font-weight="700">+500 instalaciones</text>
  <text x="1528" y="270" font-family="Arial,sans-serif" font-size="11" fill="#64748b">en Buenos Aires</text>

  <rect x="1490" y="300" width="160" height="50" rx="12" fill="white" opacity="0.9"/>
  <text x="1502" y="322" font-family="Arial,sans-serif" font-size="18" fill="#0ea5e9">⏱</text>
  <text x="1528" y="323" font-family="Arial,sans-serif" font-size="13" fill="#1e293b" font-weight="700">Garantía total</text>
  <text x="1528" y="340" font-family="Arial,sans-serif" font-size="11" fill="#64748b">equipos y mano de obra</text>

  <!-- Subtle white overlay -->
  <rect width="1920" height="600" fill="rgba(255,255,255,0.05)"/>
</svg>
